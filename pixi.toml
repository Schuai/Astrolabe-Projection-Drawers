[workspace]
name = "geared-astrolabe"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["win-64"]

[dependencies]
python = ">=3.12,<3.14"
numpy = ">=2.0,<3.0"
opencv = ">=4.10,<5.0"

[tasks]
draw-azimuthal-equidistant = "python draw_azimuthal_equidistant.py"
draw-stereographic = "python draw_stereographic.py"
perspective-correct = "python perspective_corrector.py"
